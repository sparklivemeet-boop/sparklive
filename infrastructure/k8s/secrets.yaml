apiVersion: v1
kind: Secret
metadata:
  name: sparklive-secrets
  namespace: sparklive
  labels:
    app: sparklive
    environment: production
type: Opaque
data:
  # Database Credentials
  DB_PASSWORD: "${BASE64_DB_PASSWORD}"
  DB_REPLICA_PASSWORD: "${BASE64_DB_REPLICA_PASSWORD}"

  # Redis
  REDIS_PASSWORD: "${BASE64_REDIS_PASSWORD}"

  # JWT Authentication
  JWT_SECRET: "${BASE64_JWT_SECRET}"
  JWT_REFRESH_SECRET: "${BASE64_JWT_REFRESH_SECRET}"
  JWT_ISSUER: "${BASE64_JWT_ISSUER}"

  # Encryption Keys
  ENCRYPTION_KEY: "${BASE64_ENCRYPTION_KEY}"
  HASHING_SECRET: "${BASE64_HASHING_SECRET}"
  CSRF_SECRET: "${BASE64_CSRF_SECRET}"

  # Session
  SESSION_SECRET: "${BASE64_SESSION_SECRET}"

  # Stripe (Payments)
  STRIPE_SECRET_KEY: "${BASE64_STRIPE_SECRET_KEY}"
  STRIPE_PUBLISHABLE_KEY: "${BASE64_STRIPE_PUBLISHABLE_KEY}"
  STRIPE_WEBHOOK_SECRET: "${BASE64_STRIPE_WEBHOOK_SECRET}"

  # Cloudinary (Media CDN - optional)
  CLOUDINARY_CLOUD_NAME: "${BASE64_CLOUDINARY_CLOUD_NAME}"
  CLOUDINARY_API_KEY: "${BASE64_CLOUDINARY_API_KEY}"
  CLOUDINARY_API_SECRET: "${BASE64_CLOUDINARY_API_SECRET}"

  # SMTP (Email)
  SMTP_HOST: "${BASE64_SMTP_HOST}"
  SMTP_PORT: "${BASE64_SMTP_PORT}"
  SMTP_USER: "${BASE64_SMTP_USER}"
  SMTP_PASSWORD: "${BASE64_SMTP_PASSWORD}"
  SMTP_FROM_EMAIL: "${BASE64_SMTP_FROM_EMAIL}"

  # Push Notifications
  PUSH_NOTIFICATION_KEY: "${BASE64_PUSH_NOTIFICATION_KEY}"
  FCM_SERVER_KEY: "${BASE64_FCM_SERVER_KEY}"
  APNS_KEY_ID: "${BASE64_APNS_KEY_ID}"
  APNS_TEAM_ID: "${BASE64_APNS_TEAM_ID}"

  # S3 / MinIO Credentials
  S3_ACCESS_KEY: "${BASE64_MINIO_ROOT_USER}"
  S3_SECRET_KEY: "${BASE64_MINIO_ROOT_PASSWORD}"

  # CDN
  CDN_API_KEY: "${BASE64_CDN_API_KEY}"
  CDN_PURGE_TOKEN: "${BASE64_CDN_PURGE_TOKEN}"

  # Admin
  ADMIN_API_KEY: "${BASE64_ADMIN_API_KEY}"
  ADMIN_USERNAME: "${BASE64_ADMIN_USERNAME}"
  ADMIN_PASSWORD: "${BASE64_ADMIN_PASSWORD}"

  # Monitoring
  GRAFANA_PASSWORD: "${BASE64_GRAFANA_PASSWORD}"
  PROMETHEUS_PASSWORD: "${BASE64_PROMETHEUS_PASSWORD}"

  # Alerts
  PAGERDUTY_API_KEY: "${BASE64_PAGERDUTY_API_KEY}"
  SLACK_WEBHOOK_URL: "${BASE64_SLACK_WEBHOOK_URL}"
  SENTRY_DSN: "${BASE64_SENTRY_DSN}"

  # SMS
  TWILIO_ACCOUNT_SID: "${BASE64_TWILIO_ACCOUNT_SID}"
  TWILIO_AUTH_TOKEN: "${BASE64_TWILIO_AUTH_TOKEN}"
  TWILIO_PHONE_NUMBER: "${BASE64_TWILIO_PHONE_NUMBER}"

  # External APIs
  RECAPTCHA_SITE_KEY: "${BASE64_RECAPTCHA_SITE_KEY}"
  RECAPTCHA_SECRET_KEY: "${BASE64_RECAPTCHA_SECRET_KEY}"
  GOOGLE_CLIENT_ID: "${BASE64_GOOGLE_CLIENT_ID}"
  GOOGLE_CLIENT_SECRET: "${BASE64_GOOGLE_CLIENT_SECRET}"
  APPLE_CLIENT_ID: "${BASE64_APPLE_CLIENT_ID}"
  APPLE_TEAM_ID: "${BASE64_APPLE_TEAM_ID}"
  APPLE_KEY_ID: "${BASE64_APPLE_KEY_ID}"
  APPLE_PRIVATE_KEY: "${BASE64_APPLE_PRIVATE_KEY}"
---
apiVersion: v1
kind: Secret
metadata:
  name: sparklive-docker-registry
  namespace: sparklive
  labels:
    app: sparklive
    environment: production
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "${BASE64_DOCKER_CONFIG}"
---
apiVersion: v1
kind: Secret
metadata:
  name: sparklive-tls
  namespace: sparklive
  labels:
    app: sparklive
    environment: production
type: kubernetes.io/tls
data:
  tls.crt: "${BASE64_TLS_CERT}"
  tls.key: "${BASE64_TLS_KEY}"