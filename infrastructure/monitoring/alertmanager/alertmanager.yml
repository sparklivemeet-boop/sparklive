# =============================================================================
# SparkLive - Alertmanager Configuration
# =============================================================================

global:
  resolve_timeout: 5m
  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_from: 'alerts@sparklive.com'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true
  slack_api_url: '${SLACK_WEBHOOK_URL}'
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts - immediate notification
    - receiver: 'pagerduty-critical'
      match:
        severity: critical
      repeat_interval: 15m
      routes:
        - receiver: 'slack-critical'
          continue: true

    # High severity - page on-call
    - receiver: 'pagerduty-high'
      match:
        severity: high
      repeat_interval: 30m

    # Warning severity - email + slack
    - receiver: 'slack-warning'
      match:
        severity: warning
      repeat_interval: 2h

    # Infrastructure alerts
    - receiver: 'slack-infrastructure'
      match:
        team: infrastructure
      group_wait: 1m
      group_interval: 10m

    # Security alerts
    - receiver: 'pagerduty-security'
      match:
        team: security
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 15m

    # Payment alerts
    - receiver: 'pagerduty-payments'
      match:
        team: payments
      group_wait: 30s
      group_interval: 2m
      repeat_interval: 5m

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'cluster']

  - source_match:
      severity: critical
    target_match:
      severity: high
    equal: ['alertname', 'cluster']

receivers:
  - name: 'default'
    email_configs:
      - to: 'devops@sparklive.com'
        send_resolved: true

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_ROUTING_KEY}'
        severity: critical
        images:
          - src: 'https://sparklive.com/alerts/critical.png'
        send_resolved: true

  - name: 'pagerduty-high'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_ROUTING_KEY}'
        severity: error
        send_resolved: true

  - name: 'pagerduty-security'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_SECURITY_KEY}'
        severity: critical
        send_resolved: true

  - name: 'pagerduty-payments'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_PAYMENTS_KEY}'
        severity: critical
        send_resolved: true

  - name: 'slack-critical'
    slack_configs:
      - channel: '#alerts-critical'
        title: '🚨 [CRITICAL] {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Severity:* {{ .Labels.severity }}
            *Instance:* {{ .Labels.instance }}
            *Time:* {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ end }}
        send_resolved: true
        color: 'danger'
        icon_emoji: ':fire:'

  - name: 'slack-warning'
    slack_configs:
      - channel: '#alerts-warning'
        title: '⚠️ [WARNING] {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Severity:* {{ .Labels.severity }}
            *Instance:* {{ .Labels.instance }}
          {{ end }}
        send_resolved: true
        color: 'warning'

  - name: 'slack-infrastructure'
    slack_configs:
      - channel: '#alerts-infrastructure'
        title: '🖥️ [INFRA] {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Severity:* {{ .Labels.severity }}
          {{ end }}
        send_resolved: true
        color: '#439FE0'