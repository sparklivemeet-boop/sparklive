apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: sparklive
  labels:
    app: sparklive
    component: ai-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sparklive
      component: ai-service
  template:
    metadata:
      labels:
        app: sparklive
        component: ai-service
    spec:
      priorityClassName: sparklive-medium
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: ai-service
          image: ${REGISTRY}/sparklive-ai:${IMAGE_TAG}
          ports:
            - containerPort: 5003
              name: http
          envFrom:
            - secretRef:
                name: sparklive-secrets
            - configMapRef:
                name: sparklive-config
          env:
            - name: PORT
              value: "5003"
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: models
              mountPath: /app/models
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ai-models-pvc
      nodeSelector:
        type: gpu
        instance-type: compute-optimized
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service-hpa
  namespace: sparklive
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-models-pvc
  namespace: sparklive
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: efs