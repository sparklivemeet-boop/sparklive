apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sparklive
  labels:
    app: sparklive
    component: frontend
spec:
  selector:
    app: sparklive
    component: frontend
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: sparklive
  labels:
    app: sparklive
    component: backend-api
spec:
  selector:
    app: sparklive
    component: backend-api
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: websocket
  namespace: sparklive
  labels:
    app: sparklive
    component: websocket
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  selector:
    app: sparklive
    component: websocket
  ports:
    - port: 5001
      targetPort: 5001
      protocol: TCP
      name: ws
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 86400
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: sparklive
  labels:
    app: sparklive
    component: admin
spec:
  selector:
    app: sparklive
    component: admin
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: sparklive
  labels:
    app: sparklive
    component: worker
spec:
  selector:
    app: sparklive
    component: worker
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: metrics
  type: ClusterIP
---
apiVersion: v1
