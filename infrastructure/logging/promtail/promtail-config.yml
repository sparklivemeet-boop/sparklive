# =============================================================================
# SparkLive - Promtail Log Shipping Configuration
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Kubernetes Pod Logs
  - job_name: kubernetes-pods
    pipeline_stages:
      - cri: {}
      - regex:
          expression: '^(?P<level>\w+)\s+(?P<message>.*)$'
      - labels:
          level:
      - drop:
          expression: '^\s*$'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - sparklive
            - sparklive-monitoring
    relabel_configs:
      - source_labels:
          - __meta_kubernetes_pod_label_app
        target_label: app
      - source_labels:
          - __meta_kubernetes_pod_label_component
        target_label: component
      - source_labels:
          - __meta_kubernetes_pod_label_environment
        target_label: environment
      - source_labels:
          - __meta_kubernetes_pod_container_name
        target_label: container
      - source_labels:
          - __meta_kubernetes_namespace
        target_label: namespace
      - source_labels:
          - __meta_kubernetes_pod_name
        target_label: pod
      - source_labels:
          - __meta_kubernetes_pod_node_name
        target_label: node
      - replacement: /var/log/pods/*$1/*.log
        separator: /
        source_labels:
          - __meta_kubernetes_pod_uid
          - __meta_kubernetes_pod_container_name
        target_label: __path__

  # System Logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          app: system
          __path__: /var/log/*.log

  # Docker Container Logs
  - job_name: docker
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - labels:
          stream:
      - timestamp:
          source: time
          format: RFC3339Nano
      - output:
          source: log
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels:
          - __meta_docker_container_name
        regex: '/(.*)'
        target_label: container
      - source_labels:
          - __meta_docker_container_image
        target_label: image

  # Journald Logs
  - job_name: journal
    journal:
      max_age: 12h
      labels:
        job: systemd-journal
    relabel_configs:
      - source_labels:
          - __journal__systemd_unit
        target_label: unit
      - source_labels:
          - __journal__hostname
        target_label: hostname