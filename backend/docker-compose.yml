version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sparklive-postgres
    environment:
      POSTGRES_USER: sparkuser
      POSTGRES_PASSWORD: sparkpassword
      POSTGRES_DB: sparklive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
