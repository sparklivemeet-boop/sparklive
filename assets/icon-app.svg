<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF2E8B"/>
      <stop offset="35%" stop-color="#FF3EA5"/>
      <stop offset="65%" stop-color="#8B3DFF"/>
      <stop offset="100%" stop-color="#C45CFF"/>
    </linearGradient>
    <clipPath id="mask">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="#0a0a0f"/>

  <!-- Gradient overlay -->
  <g clip-path="url(#mask)">
    <rect width="1024" height="1024" fill="url(#bg)" opacity="0.95"/>
  </g>

  <!-- Logo symbol centered -->
  <g transform="translate(512, 480)">

    <!-- Main flame teardrop -->
    <path d="
      M 0, -200
      C 60, -170 110, -110 120, -50
      C 132, 20 120, 80 90, 130
      C 55, 190 20, 220 0, 230
      C -20, 220 -55, 190 -90, 130
      C -120, 80 -132, 20 -120, -50
      C -110, -110 -60, -170 0, -200
      Z" fill="#FFFFFF"/>

    <!-- Left heart curve -->
    <path d="
      M 0, 50
      C -25, 10 -80, -5 -105, 25
      C -130, 55 -125, 95 -95, 115
      C -65, 135 -30, 135 0, 105
      Z" fill="#FFFFFF"/>

    <!-- Right heart curve -->
    <path d="
      M 0, 50
      C 25, 10 80, -5 105, 25
      C 130, 55 125, 95 95, 115
      C 65, 135 30, 135 0, 105
      Z" fill="#FFFFFF"/>

    <!-- Left fold -->
    <path d="
      M 0, -200
      C -45, -165 -85, -100 -100, -40
      C -55, -75 -25, -95 0, -105
      Z" fill="#FFFFFF" opacity="0.5"/>

    <!-- Right fold -->
    <path d="
      M 0, -200
      C 45, -165 85, -100 100, -40
      C 55, -75 25, -95 0, -105
      Z" fill="#FFFFFF" opacity="0.5"/>

  </g>
</svg>