# =============================================================================
# SparkLive - Production Docker Compose
# Complete enterprise deployment with all services
# =============================================================================

version: '3.9'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-deploy: &default-deploy
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 3
    window: 120s
  update_config:
    parallelism: 1
    delay: 10s
    order: start-first
    failure_action: rollback
  rollback_config:
    parallelism: 1
    delay: 5s
    order: stop-first

x-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

networks:
  sparklive-net:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 10.0.0.0/24
  monitoring-net:
    driver: overlay
    attachable: true
  db-net:
    driver: overlay
    internal: true
  cache-net:
    driver: overlay
    internal: true

volumes:
  postgres-primary-data:
    driver: local
  postgres-replica-data:
    driver: local
  redis-master-0-data:
    driver: local
  redis-master-1-data:
    driver: local
  redis-master-2-data:
    driver: local
  redis-slave-0-data:
    driver: local
  redis-slave-1-data:
    driver: local
  redis-slave-2-data:
    driver: local
  minio-data-0:
    driver: local
  minio-data-1:
    driver: local
  minio-data-2:
    driver: local
  minio-data-3:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

services:
  # ============================================================================
  # REVERSE PROXY / LOAD BALANCER
  # ============================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: sparklive-nginx
    <<: *default-deploy
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/geoip:/etc/nginx/geoip:ro
    networks:
      - sparklive-net
    depends_on:
      frontend:
        condition: service_healthy
      backend-api:
        condition: service_healthy
      websocket:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck: *default-healthcheck
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ============================================================================
  # FRONTEND
  # ============================================================================
  frontend:
    image: ${REGISTRY:-sparklive}/frontend:${TAG:-latest}
    container_name: sparklive-frontend
    <<: *default-deploy
    logging: *default-logging
    build:
      context: ../
      dockerfile: infrastructure/Dockerfile.frontend
    ports:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.sparklive.com
      - NEXT_PUBLIC_WS_URL=wss://ws.sparklive.com
      - NEXT_PUBLIC_CDN_URL=https://cdn.sparklive.com
    networks:
      - sparklive-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      mode: replicated
      replicas: 3
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================================================
  # BACKEND API
  # ============================================================================
  backend-api:
    image: ${REGISTRY:-sparklive}/backend:${TAG:-latest}
    <<: *default-deploy
    logging: *default-logging
    build:
      context: ../
      dockerfile: infrastructure/Dockerfile.backend
    ports:
      - "5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://sparkuser:${DB_PASSWORD}@postgres-primary:5432/sparklive
      - DATABASE_REPLICA_URL=postgresql://sparkuser:${DB_PASSWORD}@postgres-replica:5432/sparklive
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-master-0:6379
      - REDIS_SENTINEL_URLS=redis-sentinel:26379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - CLOUDINARY_URL=${CLOUDINARY_URL}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=sparklive-media
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASSWORD}
      - CORS_ORIGINS=https://sparklive.com,https://admin.sparklive.com
      - LOG_LEVEL=info
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX=100
    networks:
      - sparklive-net
      - db-net
      - cache-net
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-master-0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 5
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================================================
  # WEBSOCKET SERVER
  # ============================================================================
  websocket:
    image: ${REGISTRY:-sparklive}/websocket:${TAG:-latest}
    <<: *default-deploy
    logging: *default-logging
    build:
      context: ../
      dockerfile: infrastructure/Dockerfile.websocket
    ports:
      - "5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-master-0:6379
      - REDIS_PUB_SUB_URL=redis://:${REDIS_PASSWORD}@redis-master-0:6379
      - JWT_SECRET=${JWT_SECRET}
      - WS_MAX_CONNECTIONS=10000
      - WS_PING_TIMEOUT=60000
      - WS_PING_INTERVAL=25000
    networks:
      - sparklive-net
      - cache-net
    depends_on:
      redis-master-0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 5
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ============================================================================
  # BACKGROUND WORKERS
  # ============================================================================
  worker:
    image: ${REGISTRY:-sparklive}/worker:${TAG:-latest}
    <<: *default-deploy
    logging: *default-logging
    build:
      context: ../
      dockerfile: infrastructure/Dockerfile.worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://sparkuser:${DB_PASSWORD}@postgres-primary:5432/sparklive
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-master-0:6379
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - PUSH_NOTIFICATION_KEY=${PUSH_NOTIFICATION_KEY}
    networks:
      - db-net
      - cache-net
      - sparklive-net
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-master-0:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================================================
  # MEDIA PROCESSOR
  # ============================================================================
  media-processor:
    image: ${REGISTRY:-sparklive}/media:${TAG:-latest}
    <<: *default-deploy
    logging: *default-logging
    build:
      context: ../
      dockerfile: infrastructure/Dockerfile.media
    ports:
      - "5002"
    environment:
      - NODE_ENV=production
      - PORT=5002
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=sparklive-media
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-master-0:6379
      - MEDIA_MAX_FILE_SIZE=104857600
      - IMAGE_QUALITY=80
      - VIDEO_BITRATE=2M
    networks:
      - cache-net
      - sparklive-net
    depends_on:
      minio:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  # ============================================================================
  # AI SERVICES
  # ============================================================================
  ai-service:
    image: ${REGISTRY:-sparklive}/ai:${TAG:-latest}
    <<: *default-deploy
    logging: *default-logging
    build:
      context: ../
      dockerfile: infrastructure/Dockerfile.ai
    ports:
      - "5003"
    environment:
      - PORT=5003
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-master-0:6379
      - DATABASE_URL=postgresql://sparkuser:${DB_PASSWORD}@postgres-primary:5432/sparklive
      - MODEL_CACHE_DIR=/app/models
      - LOG_LEVEL=info
    volumes:
      - ai-models:/app/models
    networks:
      - sparklive-net
      - cache-net
      - db-net
    depends_on:
      redis-master-0:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # ============================================================================
  # ADMIN DASHBOARD
  # ============================================================================
  admin:
    image: ${REGISTRY:-sparklive}/admin:${TAG:-latest}
    <<: *default-deploy
    logging: *default-logging
    build:
      context: ../
      dockerfile: infrastructure/Dockerfile.admin
    ports:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - API_URL=https://api.sparklive.com
      - WS_URL=wss://ws.sparklive.com
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    networks:
      - sparklive-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================================================
  # POSTGRES DATABASE (PRIMARY)
  # ============================================================================
  postgres-primary:
    image: postgres:15-alpine
    container_name: sparklive-postgres-primary
    <<: *default-deploy
    logging: *default-logging
    ports:
      - "5432"
    environment:
      - POSTGRES_USER=sparkuser
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=sparklive
      - POSTGRES_INITDB_ARGS=--data-checksums
      - PG_DATA=/var/lib/postgresql/data
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./database/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./database/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparkuser -d sparklive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # ============================================================================
  # POSTGRES DATABASE (REPLICA)
  # ============================================================================
  postgres-replica:
    image: postgres:15-alpine
    container_name: sparklive-postgres-replica
    <<: *default-deploy
    logging: *default-logging
    ports:
      - "5433"
    environment:
      - POSTGRES_USER=sparkuser
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=sparklive
      - POSTGRES_PRIMARY_HOST=postgres-primary
      - POSTGRES_PRIMARY_PORT=5432
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
    networks:
      - db-net
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparkuser -d sparklive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ============================================================================
  # REDIS CLUSTER
  # ============================================================================
  redis-master-0:
    image: redis:7-alpine
    container_name: sparklive-redis-master-0
    <<: *default-deploy
    logging: *default-logging
    ports:
      - "6379"
    command: >
      redis-server --appendonly yes
        --requirepass ${REDIS_PASSWORD}
        --masterauth ${REDIS_PASSWORD}
        --maxmemory 2gb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
    volumes:
      - redis-master-0-data:/data
    networks:
      - cache-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  redis-master-1:
    image: redis:7-alpine
    container_name: sparklive-redis-master-1
    <<: *default-deploy
    logging: *default-logging
    ports:
      - "6380"
    command: >
      redis-server --appendonly yes
        --requirepass ${REDIS_PASSWORD}
        --masterauth ${REDIS_PASSWORD}
        --maxmemory 2gb
        --maxmemory-policy allkeys-lru
        --port 6380
        --save 900 1
        --save 300 10
        --save 60 10000
    volumes:
      - redis-master-1-data:/data
    networks:
      - cache-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "-p", "6380", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  redis-master-2:
    image: redis:7-alpine
    container_name: sparklive-redis-master-2
    <<: *default-deploy
    logging: *default-logging
    ports:
      - "6381"
    command: >
      redis-server --appendonly yes
        --requirepass ${REDIS_PASSWORD}
        --masterauth ${REDIS_PASSWORD}
        --maxmemory 2gb
        --maxmemory-policy allkeys-lru
        --port 6381
        --save 900 1
        --save 300 10
        --save 60 10000
    volumes:
      - redis-master-2-data:/data
    networks:
      - cache-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "-p", "6381", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  redis-sentinel:
    image: redis:7-alpine
    container_name: sparklive-redis-sentinel
    <<: *default-deploy
    logging: *default-logging
    ports:
      - "26379"
    command: >
      redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    networks:
      - cache-net
    depends_on:
      - redis-master-0
      - redis-master-1
      - redis-master-2
    deploy:
      mode: replicated
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ============================================================================
  # MINIO OBJECT STORAGE
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: sparklive-minio
    <<: *default-deploy
    logging: *default-logging
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    volumes:
      - minio-data-0:/data-0
      - minio-data-1:/data-1
      - minio-data-2:/data-2
      - minio-data-3:/data-3
    command: server /data-{0...3} --console-address ":9001"
    networks:
      - sparklive-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 4
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # ============================================================================
  # MONITORING STACK
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: sparklive-prometheus
    <<: *default-deploy
    logging: *default-logging
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=50GB'
      - '--web.enable-lifecycle'
    networks:
      - monitoring-net
      - sparklive-net
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  grafana:
    image: grafana/grafana:10.1.0
    container_name: sparklive-grafana
    <<: *default-deploy
    logging: *default-logging
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=https://monitor.sparklive.com
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring-net
      - sparklive-net
    depends_on:
      - prometheus
      - loki
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  loki:
    image: grafana/loki:2.9.1
    container_name: sparklive-loki
    <<: *default-deploy
    logging: *default-logging
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring-net
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  promtail:
    image: grafana/promtail:2.9.1
    container_name: sparklive-promtail
    <<: *default-deploy
    logging: *default-logging
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring-net
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: sparklive-alertmanager
    <<: *default-deploy
    logging: *default-logging
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring-net
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ============================================================================
  # NODE EXPORTER (for metrics collection)
  # ============================================================================
  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: sparklive-node-exporter
    <<: *default-deploy
    logging: *default-logging
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100"
    networks:
      - monitoring-net
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ============================================================================
  # CADVISOR (Docker container metrics)
  # ============================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: sparklive-cadvisor
    <<: *default-deploy
    logging: *default-logging
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080"
